name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build and package dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build hatchling
          python -m pip install -e sdk/python -e runtime/python
          python -m pip install -r docs/requirements.txt

      - name: Run top-level tests
        run: python -m unittest discover -s tests

      - name: Run SDK tests
        run: python -m unittest discover -s sdk/python/tests

      - name: Run runtime tests
        run: python -m unittest discover -s runtime/python/tests

      - name: Build docs
        run: mkdocs build --strict

      - name: Build SDK package
        run: python -m build --no-isolation sdk/python

      - name: Build runtime package
        run: python -m build --no-isolation runtime/python
